<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Local Shopping</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">🏺 Local Shopping</div>
        <nav>
            <a href="index.html">Vitrine</a>
            <a href="lojas.html">Meus Produtos (Lojista)</a>
        </nav>
    </header>
    <main class="form-container">
        <div class="card-form">
            <h2>Login</h2>
            <form id="loginForm">
                <label>E-mail</label>
                <input type="email" id="loginEmail" required>
                <label>Senha</label>
                <input type="password" id="loginSenha" required>
                <button type="submit" class="btn-primary">Entrar</button>
            </form>
            <p>Não tem conta? <a href="cadastro.html">Cadastre-se</a></p>
        </div>
    </main>
    <script src="js/shared/storage.js"></script>
    <script src="js/shared/auth.js"></script>
    <script src="js/pages/login.js"></script>
</body>
</html>
